<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <h1 class="form-title">Registration Form</h1>

  <form class="registration-form">

    <fieldset class="form-section">
      <legend>Personal Information</legend>

      <div class="form-field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required />
      </div>

      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
      </div>

      <div class="form-field">
        <span class="form-label-group">Gender</span>

        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
        <label><input type="radio" name="gender" value="other"> Other</label>
      </div>

    </fieldset>


    <fieldset class="form-section">
      <legend>Educational Information</legend>

      <div class="form-field">
        <label for="marks">Marks</label>
        <input id="marks" name="marks" type="number" />
      </div>

      <div class="form-field">
        <label for="program">Program</label>
        <select id="program" name="program">
          <option>-- Select --</option>
          <option>BS Computer Science</option>
          <option>BS Artificial Intelligence</option>
          <option>BS Software Engineering</option>
        </select>
      </div>

      <div class="form-field">
        <span class="form-label-group">Skills</span>

        <label><input type="checkbox" name="skills" value="html"> HTML</label>
        <label><input type="checkbox" name="skills" value="css"> CSS</label>
        <label><input type="checkbox" name="skills" value="js"> JavaScript</label>
      </div>

    </fieldset>

    <button type="submit" class="submit-button">Submit</button>

  </form>

</body>
</html>
