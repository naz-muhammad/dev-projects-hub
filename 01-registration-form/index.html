<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
</head>

<body>
    <h1 class="main-heading">Registration Form</h1>

    <form class="container">
        <fieldset>
            <legend>Personal Information</legend>
            <div>
                <label for="name">Enter your name</label>
                <input type="text" id="name" placeholder="Enter your name" required />
            </div>
            <div>
                <label for="email">Enter your email</label>
                <input type="text" id="email" placeholder="Enter your email" required />
            </div>
            <div>
                <label for="password">Enter your password</label>
                <input type="text" id="password" placeholder="Enter your password" required />
            </div>

            <label for="gender" style="display: block;">Seclect your gender</label>
            <input type="radio" name="male" id="gender"><label for="male">Male</label>
            <input type="radio" name="Female" id="gender"><label for="Female">Female</label>
            <input type="radio" name="other" id="gender"><label for="other">Prefer not to say</label>

        </fieldset>

        <fieldset>

            <legend>Educational Information</legend>
            <div>
                <label for="marks">Enter your marks</label>
                <input type="number" name="marks" id="marks">
            </div>

            <label for="program">Choose your degree</label>
            <select name="" id="">
                <option value="">-- Select Your Program --</option>
                <option value="">BS Computer Science</option>
                <option value="">BS Artificial Intelligence</option>
                <option value="">BS Software Engineering</option>
            </select>

            <label for="skills" style="display: block;">Choose your skills</label>
            <input type="checkbox" name="html" id="html"> <label for="html">HTML</label>
            <input type="checkbox" name="css" id="css"> <label for="css">CSS</label>
            <input type="checkbox" name="js" id="js"> <label for="js">JavaScript</label>
        </fieldset>

        <button type="submit">Submit</button>
    </form>
</body>

</html>
